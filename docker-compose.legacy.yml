services:
  sqlserver:
    image: mcr.microsoft.com/azure-sql-edge:latest
    container_name: eshop-sqlserver
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=eShop@Pass123
    ports:
      - "1433:1433"
    networks:
      - eshop-net
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P 'eShop@Pass123' -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  eshop-legacy-mvc:
    build:
      context: ./eShopLegacyMVCSolution
      dockerfile: src/eShopLegacyMVC/Dockerfile
    container_name: eshop-legacy-mvc
    ports:
      - "5001:8080"
    environment:
      - ConnectionStrings__CatalogDBContext=Server=sqlserver,1433;Database=Microsoft.eShopOnContainers.Services.CatalogDb;User Id=sa;Password=eShop@Pass123;TrustServerCertificate=True;MultipleActiveResultSets=True
      - UseMockData=false
      - UseCustomizationData=false
    depends_on:
      sqlserver:
        condition: service_started
    networks:
      - eshop-net
    restart: on-failure

  eshop-ported:
    build:
      context: ./eShopLegacyMVCSolution
      dockerfile: eShopPorted/Dockerfile
    container_name: eshop-ported
    ports:
      - "5002:8080"
    environment:
      - ConnectionStrings__DefaultConnection=Server=sqlserver,1433;Database=Microsoft.eShopOnContainers.Services.CatalogDb;User Id=sa;Password=eShop@Pass123;TrustServerCertificate=True;MultipleActiveResultSets=True
      - UseMockData=false
      - UseCustomizationData=false
    depends_on:
      sqlserver:
        condition: service_started
    networks:
      - eshop-net
    restart: on-failure

  eshop-legacy-webforms:
    build:
      context: ./eShopLegacyWebFormsSolution
      dockerfile: src/eShopLegacyWebForms/Dockerfile
    container_name: eshop-legacy-webforms
    ports:
      - "5003:8080"
    environment:
      - ConnectionStrings__CatalogDBContext=Server=sqlserver,1433;Database=Microsoft.eShopOnContainers.Services.CatalogDb;User Id=sa;Password=eShop@Pass123;TrustServerCertificate=True;MultipleActiveResultSets=True
      - AppSettings__UseMockData=false
      - AppSettings__UseCustomizationData=false
    depends_on:
      sqlserver:
        condition: service_started
    networks:
      - eshop-net
    restart: on-failure

  eshop-wcf-host:
    build:
      context: ./eShopLegacyNTier
      dockerfile: src/eShopWCFService.Host/Dockerfile
    container_name: eshop-wcf-host
    ports:
      - "5004:8080"
    environment:
      - ConnectionStrings__EntityModel=Server=sqlserver,1433;Database=Microsoft.eShopOnContainers.Services.CatalogDb;User Id=sa;Password=eShop@Pass123;TrustServerCertificate=True;MultipleActiveResultSets=True
    depends_on:
      sqlserver:
        condition: service_started
    networks:
      - eshop-net
    restart: on-failure

networks:
  eshop-net:
    driver: bridge
